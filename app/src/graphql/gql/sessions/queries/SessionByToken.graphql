#import "../../fragments/CategoryFields.graphql"
#import "../../fragments/PresetFields.graphql"
#import "../../fragments/BaseFields.graphql"

query SessionByToken($token: String!) {
  sessionByToken(token: $token) {
    id
    status
    station {
      name
      description
      customizationCategories {
        ...CategoryFields
      }
      menuPresets {
        ...PresetFields
      }
      bases {
        ...BaseFields
      }
    }
  }
}
