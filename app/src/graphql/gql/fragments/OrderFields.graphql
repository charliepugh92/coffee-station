fragment OrderFields on Order {
  id
  guestName
  status
  queuePosition
  notes
  completionPhotoUrl
  createdAt
  stationName
  canReorder
  memory {
    baseName
    presetName
    groups {
      category
      options
    }
  }
  rating {
    id
    stars
  }
  comments {
    id
    body
    createdAt
  }
}
