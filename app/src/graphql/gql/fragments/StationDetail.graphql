#import "./CategoryFields.graphql"
#import "./PresetFields.graphql"
#import "./BaseFields.graphql"

fragment StationDetail on Station {
  id
  name
  slug
  description
  openSession {
    id
    status
    shareToken
  }
  customizationCategories {
    ...CategoryFields
  }
  menuPresets {
    ...PresetFields
  }
  bases {
    ...BaseFields
  }
}
