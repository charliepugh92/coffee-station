test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Cloudflare R2 (S3-compatible) — production image storage. The bucket stays
# private; Active Storage serves attachments via short-lived signed URLs through
# its redirect controller. Everything vendor-specific lives in encrypted
# production credentials under r2: (account_id, bucket_name, access_key_id,
# secret_access_key) — nothing R2-identifying is hard-coded here.
#   cd api && bin/rails credentials:edit --environment production
cloudflare:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:r2, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:r2, :secret_access_key) %>
  endpoint: https://<%= Rails.application.credentials.dig(:r2, :account_id) %>.r2.cloudflarestorage.com
  bucket: <%= Rails.application.credentials.dig(:r2, :bucket_name) %>
  region: auto
  # aws-sdk-s3 >= 1.179 sends a CRC32 integrity checksum on every upload by
  # default. R2 rejects requests carrying that alongside its own checksum
  # ("You can only specify one non-default checksum at a time"), so restrict
  # checksums to operations that actually require them. Active Storage forwards
  # these keys straight to Aws::S3::Client.
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

