# Render Blueprint for Davey's Coffee — https://render.com/docs/blueprint-spec
#
# Provisions the whole stack on Render's free tier:
#   - Postgres database
#   - Key Value (Redis) for Action Cable pub/sub
#   - Rails GraphQL API (web service)
#   - Vue SPA (static site)
#
# Deploy: push this repo to GitHub, then in Render create a new Blueprint
# pointing at it. See DEPLOY.md for the free-tier caveats and the one manual
# step (RAILS_MASTER_KEY) — and read the note on the *.onrender.com URLs below.

databases:
  - name: coffee-station-db
    plan: free
    region: oregon
    databaseName: coffee_station_production
    user: coffee_station

services:
  # Redis / Key Value — backs Action Cable in production (cable.yml `redis`).
  # Free plan has no persistence, which is fine for ephemeral pub/sub.
  - type: keyvalue
    name: coffee-station-cable
    plan: free
    region: oregon
    ipAllowList: [] # reachable only from other Render services
    maxmemoryPolicy: noeviction

  # Rails GraphQL API + Action Cable.
  - type: web
    name: coffee-station-api
    runtime: ruby
    plan: free
    region: oregon
    rootDir: api
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false # paste the contents of api/config/master.key (optional — see DEPLOY.md)
      - key: SECRET_KEY_BASE
        generateValue: true # generated once and kept stable, so issued JWTs stay valid
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: coffee-station-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: coffee-station-cable
          property: connectionString
      - key: API_HOST # used to build absolute Active Storage image URLs
        fromService:
          type: web
          name: coffee-station-api
          property: host
      - key: API_PROTOCOL
        value: https
      # Full origin of the SPA — used for CORS and the Action Cable origin check.
      # Update this if Render appends a suffix to the static site's hostname.
      - key: FRONTEND_URL
        value: https://coffee-station-app.onrender.com

  # Vue SPA — built to static files and served from Render's CDN.
  - type: web
    runtime: static
    name: coffee-station-app
    rootDir: app
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Baked into the bundle at build time; the WebSocket URL is derived from it
      # (https → wss). Update if Render appends a suffix to the API's hostname.
      - key: VITE_API_URL
        value: https://coffee-station-api.onrender.com
    routes:
      # SPA fallback — let Vue Router handle client-side paths.
      - type: rewrite
        source: /*
        destination: /index.html
