# Render Blueprint for Davey's Coffee — https://render.com/docs/blueprint-spec
#
# Provisions the whole stack on Render's free tier:
#   - Postgres database
#   - Key Value (Redis) for Action Cable pub/sub
#   - Rails GraphQL API (web service)
#   - Vue SPA (static site)
#
# Deploy: push this repo to GitHub, then in Render create a new Blueprint
# pointing at it. See DEPLOY.md for the free-tier caveats and the one manual
# step (RAILS_MASTER_KEY) — and read the note on the *.onrender.com URLs below.

databases:
  - name: coffee-station-db
    plan: free
    region: oregon
    databaseName: coffee_station_production
    user: coffee_station

services:
  # Redis / Key Value — backs Action Cable in production (cable.yml `redis`).
  # Free plan has no persistence, which is fine for ephemeral pub/sub.
  - type: keyvalue
    name: coffee-station-cable
    plan: free
    region: oregon
    ipAllowList: [] # reachable only from other Render services
    maxmemoryPolicy: noeviction

  # Rails GraphQL API + Action Cable.
  - type: web
    name: coffee-station-api
    runtime: ruby
    plan: free
    region: oregon
    rootDir: api
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false # REQUIRED: paste the contents of api/config/credentials/production.key (decrypts frontend_url / api_host / api_protocol — see DEPLOY.md)
      - key: SECRET_KEY_BASE
        generateValue: true # generated once and kept stable, so issued JWTs stay valid
      # 0 = Puma single mode (one process) — the leanest option on the 512MB free
      # tier. Clustered mode with a single worker would add an idle master process
      # for no copy-on-write benefit; only set this to 2+ (and rely on puma.rb's
      # preload_app!) once one process genuinely can't keep up.
      - key: WEB_CONCURRENCY
        value: "0"
      # Cap glibc's per-thread malloc arenas to curb the RSS fragmentation that
      # ratchets up under repeated image work. Cheap, safe win — but a NO-OP once
      # jemalloc is enabled (jemalloc ignores it), so it only helps while the
      # jemalloc lever below is still off.
      - key: MALLOC_ARENA_MAX
        value: "2"
      # BIGGEST memory lever (≈30–50% RSS) — enable jemalloc. NOT active yet: the
      # api/Dockerfile installs it and sets LD_PRELOAD, but `runtime: ruby` above
      # bypasses the Dockerfile. Enabling it is a deploy decision to make + verify
      # on Render, so it's left off here. Two options:
      #   (a) runtime: docker — also override the start command back to
      #       `bundle exec puma -C config/puma.rb` and reconcile the port, since the
      #       Dockerfile's CMD starts Thruster on :80, not puma on $PORT; or
      #   (b) keep runtime: ruby and add an LD_PRELOAD env var pointing at the
      #       native image's libjemalloc.so (confirm the absolute path first).
      # Verify on a live instance with: grep jemalloc /proc/self/maps
      - key: DATABASE_URL
        fromDatabase:
          name: coffee-station-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: coffee-station-cable
          property: connectionString
      # frontend_url (CORS + Action Cable origin), api_host, and api_protocol
      # (absolute Active Storage image URLs) now live in encrypted production
      # credentials. Edit them with:
      #   cd api && bin/rails credentials:edit --environment production

  # Vue SPA — built to static files and served from Render's CDN.
  - type: web
    runtime: static
    name: coffee-station-app
    rootDir: app
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # VITE_API_URL is baked into the bundle at build time from app/.env.production
      # (https://api.daveys.coffee); the WebSocket URL is derived from it (https → wss).
      # Override here only if you need a different API host for this deploy.
    routes:
      # SPA fallback — let Vue Router handle client-side paths.
      - type: rewrite
        source: /*
        destination: /index.html
